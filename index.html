<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cta {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cta a {
      background: #ffffff;
      color: #000;
      padding: 14px 24px;
      text-decoration: none;
      font-size: 16px;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .cta a:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="hat square black bars.png" alt="Landing Image">

    <div class="cta">
      <a href="mailto:zander@dirtmerchantenterprises.com?subject=Inquiry">Contact The Dirt Merchant</a>
    </div>
  </div>
</body>
</html>
