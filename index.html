
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: black;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* key line */
      background: black;
    }

   <style>
  .cta {
    position: absolute;
    bottom: 36px;
    width: 100%;
    diplay: flex;
    justify-content: center;
  }

  .cta a {
    display: inline-block;

    /* size */
    padding: 16px 34px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;

    /* shape */
    border-radius: 12px;

    /* visual */
    background: #ffffff;
    color: #111111;
    text-decoration: none;

    /* depth */
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);

    /* feel */
    transition: all 0.2s ease;
  }

  .cta a:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.45);
  }

  .cta a:active {
    transform: translateY(0px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.3);
  }

  /* mobile optimization */
  @media (max-width: 600px) {
    .cta a {
      width: 80vw;
      text-align: center;
      padding: 16px 0;
      font-size: 17px;
    }
  }
</style>
  </style>
</head>

  
 <body>
  <div class="container">
    <img src="hat square black bars.png" alt="Landing Image">

    <div class="cta">
      <a href="mailto:zander@dirtmerchantenterprises.com?subject=Inquiry">Contact The Dirt Merchant</a>
    </div>
  </div>
</body>
</html>
